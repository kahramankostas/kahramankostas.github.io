
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Değerlendirme Analizi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Model Değerlendirme Analizi</h1>
            <p>Yapay zeka modellerinin cevaplarını ve rubrik bazlı puanlamalarını inceleyin.</p>
        </header>

        <section class="filters">
            <div class="filter-group">
                <label for="questionSelect">Soru Seçin</label>
                <select id="questionSelect">
                    <option value="" disabled selected>Yükleniyor...</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="modelSelect">Model Seçin</label>
                <select id="modelSelect">
                    <option value="all">Tüm Modeller</option>
                </select>
            </div>
        </section>

        <section id="resultsArea" class="results-grid">
            <!-- Results will be injected here via JS -->
            <div class="placeholder-text">Lütfen verilerin yüklenmesini bekleyin...</div>
        </section>
    </div>

    <!-- Template for Result Card -->
    <template id="resultCardTemplate">
        <article class="result-card">
            <div class="card-header">
                <h2 class="model-name"></h2>
                <div class="total-score">
                    <span class="score-value"></span>
                    <span class="score-label">Toplam Puan</span>
                </div>
            </div>
            
            <div class="card-body">
                <div class="question-section">
                    <h3>Soru</h3>
                    <p class="question-text"></p>
                </div>

                <div class="answer-section">
                    <h3>Model Cevabı</h3>
                    <div class="answer-text"></div>
                </div>

                <div class="scores-section">
                    <h3>Puan Detayları</h3>
                    <div class="score-grid">
                        <div class="score-item" data-type="k1">
                            <span class="score-label">K1 (Doğruluk)</span>
                            <span class="score-value"></span>
                        </div>
                        <div class="score-item" data-type="k2">
                            <span class="score-label">K2 (Mantık)</span>
                            <span class="score-value"></span>
                        </div>
                        <div class="score-item" data-type="k3">
                            <span class="score-label">K3 (Açıklama)</span>
                            <span class="score-value"></span>
                        </div>
                    </div>
                </div>

                <div class="reasoning-section">
                    <h3>Değerlendirme Gerekçesi</h3>
                    <p class="reasoning-text"></p>
                </div>
            </div>
        </article>
    </template>

    <script src="app.js"></script>
</body>
</html>

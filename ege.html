<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Video Quiz Uygulaması</title>
<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#00c9ff,#92fe9d);
    text-align:center;
    color:#222;
}

h1{
    margin-top:20px;
    color:white;
    text-shadow:2px 2px 5px rgba(0,0,0,0.3);
}

#player{
    margin-top:20px;
}

#scoreBoard{
    font-size:22px;
    font-weight:bold;
    margin-top:15px;
    color:white;
}

#questionBox{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:25px;
    border-radius:15px;
    width:60%;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    animation: pop 0.4s ease;
}

@keyframes pop{
    from{transform:translate(-50%,-50%) scale(0.5);}
    to{transform:translate(-50%,-50%) scale(1);}
}

.optionBtn{
    display:block;
    width:80%;
    margin:10px auto;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.optionBtn:hover{
    transform:scale(1.05);
}

.correct{
    background:#2ecc71;
    color:white;
}

.wrong{
    background:#e74c3c;
    color:white;
}

.default{
    background:#3498db;
    color:white;
}

#result{
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
}

#finalScreen{
    display:none;
    margin-top:20px;
    font-size:24px;
    color:white;
}
</style>
</head>

<body>

<h1>🎬 Doğa Dedektifleri Video Quiz</h1>
<div id="player"></div>
<div id="scoreBoard">Puan: 0</div>

<div id="questionBox">
    <h3 id="questionText"></h3>
    <div id="options"></div>
    <div id="result"></div>
</div>

<div id="finalScreen"></div>

<script>
let player;
let score = 0;
let currentQuestion = 0;

const questions = [
{
    time:133,
    question:"Burası nasıl bu hale gelmiştir?",
    options:["Fırtına çıktığı için","Balıkçılar çöpleri bırakmıştır","Sahilde eğlence yapıldığı için","Belediye çöpleri toplamamıştır"],
    correct:2
},
{
    time:198,
    question:"Ege ve Gaga ertesi gün ne yapmaya karar verir?",
    options:["Eğlence düzenlemeye","Belediye ile konuşmaya","Temizlik yapmaya","Sahili terk etmeye"],
    correct:2
},
{
    time:287,
    question:"Belediye çalışanı sahile neden gelmiştir?",
    options:["Çöpleri toplamaya","Yeni çöpler bırakmaya","Toplanan çöpleri götürmeye","Denetim yapmaya"],
    correct:2
},
{
    time:364,
    question:"“Bir elin nesi var? İki elin sesi var.” sözü neyi anlatmaktadır?",
    options:["Spor yapmanın önemini","Birlikte çalışmanın gücünü","Ormanın tehlikeli olduğunu","Ayak izlerini takip etmeyi"],
    correct:1
},
{
    time:438,
    question:"Plogging yapan kişiler yanlarına ne alır?",
    options:["Su ve şapka","Eldiven ve çöp poşeti","Harita ve pusula","Fener ve ip"],
    correct:1
}
];

function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '400',
        width: '700',
        videoId: 'W0V6Xl1gbhQ',
        events: {
            'onStateChange': onPlayerStateChange
        }
    });
}

function onPlayerStateChange(event) {
    if (event.data == YT.PlayerState.PLAYING) {
        setInterval(checkTime, 1000);
    }
}

function checkTime(){
    if(currentQuestion >= questions.length) return;

    let currentTime = Math.floor(player.getCurrentTime());
    if(currentTime === questions[currentQuestion].time){
        showQuestion(questions[currentQuestion]);
    }
}

function showQuestion(q){
    player.pauseVideo();
    document.getElementById("questionText").innerText = q.question;
    let optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";
    document.getElementById("result").innerText="";

    q.options.forEach((opt,index)=>{
        let btn = document.createElement("button");
        btn.className="optionBtn default";
        btn.innerText = opt;
        btn.onclick=()=>checkAnswer(index,q.correct,btn);
        optionsDiv.appendChild(btn);
    });

    document.getElementById("questionBox").style.display="block";
}

function checkAnswer(selected,correct,btn){
    let buttons = document.querySelectorAll(".optionBtn");

    buttons.forEach(b=>b.disabled=true);

    if(selected===correct){
        btn.classList.remove("default");
        btn.classList.add("correct");
        score+=100;
        document.getElementById("result").innerText="✅ Doğru! +100 puan";
    }else{
        btn.classList.remove("default");
        btn.classList.add("wrong");
        score-=50;
        document.getElementById("result").innerText="❌ Yanlış! -50 puan";
    }

    document.getElementById("scoreBoard").innerText="Puan: "+score;

    setTimeout(()=>{
        document.getElementById("questionBox").style.display="none";
        player.playVideo();
        currentQuestion++;

        if(currentQuestion===questions.length){
            showFinal();
        }

    },2000);
}

function showFinal(){
    document.getElementById("finalScreen").style.display="block";
    document.getElementById("finalScreen").innerHTML=
        "🎉 Quiz Bitti!<br>Toplam Puan: "+score+
        "<br><br><button onclick='location.reload()' style='padding:10px 20px;border:none;border-radius:8px;background:#ff6b6b;color:white;font-size:18px;cursor:pointer;'>Tekrar Oyna</button>";
}
</script>

</body>
</html>

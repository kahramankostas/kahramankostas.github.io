<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etkileşimli Video Bilgi Yarışması</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .video-container {
            position: relative;
            width: 800px;
            max-width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Soru Penceresi (Overlay) */
        .quiz-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 10;
        }

        .quiz-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .quiz-box {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background-color: #e9ecef;
            border-color: #ced4da;
        }

        .option-btn.correct {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }

        .option-btn.wrong {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }

        .feedback-text {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <h1>Etkileşimli Video Uygulaması</h1>

    <div class="video-container">
        <div id="player"></div>

        <div id="quizOverlay" class="quiz-overlay">
            <div class="quiz-box">
                <div id="questionText" class="question-text">Soru yükleniyor...</div>
                <div id="optionsContainer" class="options-container"></div>
                <div id="feedbackText" class="feedback-text"></div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // Soru Veri Kümesi (Saniyeler cinsinden tetiklenme zamanları)
        const quizData = [
            {
                time: 112, // 00:01:52
                question: "Ege, izin sahibinin yavaş ilerlediğini nasıl anladı?",
                options: { A: "İz çok derindi.", B: "Çimler bozulmamıştı.", C: "Taşlar yer değiştirmişti.", D: "Koku almıştı." },
                correct: "B",
                triggered: false
            },
            {
                time: 143, // 00:02:23
                question: "İyi bir dedektifin hangi özelliğinden söz edildi?",
                options: { A: "Çok hızlı koşması", B: "Güzel resim çizmesi", C: "İpuçlarını iyi değerlendirmesi", D: "Güçlü olması" },
                correct: "C",
                triggered: false
            },
            {
                time: 171, // 00:02:51
                question: "Solucanın iz bırakan canlı olmadığına neden karar verildi?",
                options: { A: "Çok hızlı olduğu için", B: "Uçabildiği için", C: "Yer altında gezdiği için", D: "Kabuğu olduğu için" },
                correct: "C",
                triggered: false
            },
            {
                time: 202, // 00:03:22
                question: "İz bırakan canlı nasıl hareket ediyor olabilir?",
                options: { A: "Zıplayarak", B: "Uçarak", C: "Yeri ıslatıp kayarak", D: "Koşarak" },
                correct: "C",
                triggered: false
            },
            {
                time: 291, // 00:04:51
                question: "Canlının marul yediği nasıl anlaşıldı?",
                options: { A: "Marulun yaprağı kırpılmıştı.", B: "Marulun rengi değişmişti.", C: "Marul yerdeydi.", D: "Kokusu geliyordu." },
                correct: "A",
                triggered: false
            },
            {
                time: 357, // 00:05:57
                question: "İpuçlarının sonunda hangi canlı bulundu?",
                options: { A: "Kaplumbağa", B: "Kertenkele", C: "Kurbağa", D: "Salyangoz" },
                correct: "D",
                triggered: false
            },
            {
                time: 381, // 00:06:21
                question: "Salyangozlar tehlike anında nereye saklanır?",
                options: { A: "Toprağın altına", B: "Yaprakların arasına", C: "Kabuklarının içine", D: "Taşların altına" },
                correct: "C",
                triggered: false
            },
            {
                time: 392, // 00:06:32
                question: "Videoya göre salyangoz ne yiyebilir?",
                options: { A: "Çimen", B: "Marul", C: "Taş", D: "Böcek" },
                correct: "B",
                triggered: false
            }
        ];

        let player;
        let checkTimer;
        let currentQuestion = null;

        // YouTube API hazır olduğunda çalışacak fonksiyon
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: '5cS3rEqClOk', // Paylaştığınız videonun ID'si
                playerVars: {
                    'rel': 0,
                    'modestbranding': 1,
                    'controls': 1
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // Video oynatılma durumunu takip eden fonksiyon
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                // Video oynatılırken her 500ms'de bir zamanı kontrol et
                checkTimer = setInterval(checkVideoTime, 500);
            } else {
                clearInterval(checkTimer);
            }
        }

        // Zaman kontrol mekanizması
        function checkVideoTime() {
            if (!player || typeof player.getCurrentTime !== 'function') return;
            
            const currentTime = Math.floor(player.getCurrentTime());

            // Saniyeyi eşleşen soru var mı diye kontrol et
            const questionToTrigger = quizData.find(q => q.time === currentTime && !q.triggered);

            if (questionToTrigger) {
                clearInterval(checkTimer);
                player.pauseVideo(); // Videoyu durdur
                showQuiz(questionToTrigger);
            }
        }

        // Ekranda soruyu gösteren fonksiyon
        function showQuiz(questionObj) {
            currentQuestion = questionObj;
            
            const overlay = document.getElementById('quizOverlay');
            const qText = document.getElementById('questionText');
            const optionsContainer = document.getElementById('optionsContainer');
            const feedback = document.getElementById('feedbackText');

            feedback.textContent = "";
            optionsContainer.innerHTML = "";
            qText.textContent = questionObj.question;

            // Şıkları buton olarak ekle
            for (let key in questionObj.options) {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = `${key}) ${questionObj.options[key]}`;
                btn.onclick = () => checkAnswer(key, btn);
                optionsContainer.appendChild(btn);
            }

            overlay.classList.add('active');
        }

        // Cevabı kontrol eden fonksiyon
        function checkAnswer(selectedLetter, clickedBtn) {
            const feedback = document.getElementById('feedbackText');
            const buttons = document.querySelectorAll('.option-btn');

            // Diğer butonlara tıklanmasını engelle
            buttons.forEach(btn => btn.style.pointerEvents = 'none');

            if (selectedLetter === currentQuestion.correct) {
                clickedBtn.classList.add('correct');
                feedback.style.color = '#155724';
                feedback.textContent = "Tebrikler! Doğru cevap. Video devam ediyor...";
                
                currentQuestion.triggered = true; // Bu sorunun tekrar tetiklenmesini engelle

                // 1.5 saniye sonra soruyu kapat ve videoyu oynat
                setTimeout(() => {
                    document.getElementById('quizOverlay').classList.remove('active');
                    player.playVideo();
                }, 1500);
            } else {
                clickedBtn.classList.add('wrong');
                feedback.style.color = '#721c24';
                feedback.textContent = "Yanlış cevap! Lütfen tekrar deneyin.";
                
                // 1.5 saniye sonra tekrar denemesi için butonları aktif et
                setTimeout(() => {
                    buttons.forEach(btn => {
                        if(!btn.classList.contains('wrong')) {
                            btn.style.pointerEvents = 'auto';
                        }
                    });
                    feedback.textContent = "";
                }, 1500);
            }
        }
    </script>
</body>
</html>

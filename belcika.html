<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belçika Türkçe ve Türk Kültürü Haritası</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            color: #333;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        #map-wrapper {
            flex: 2;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e9ecef;
        }
        #map {
            width: 100%;
            max-width: 900px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 15px;
        }
        #info-panel {
            flex: 1;
            background: #ffffff;
            padding: 30px;
            box-shadow: -4px 0 15px rgba(0,0,0,0.05);
            overflow-y: auto;
            min-width: 320px;
        }
        #info-panel h2 {
            margin-top: 0;
            color: #1a252f;
            border-bottom: 3px solid #3498db;
            padding-bottom: 12px;
            font-size: 1.4rem;
        }
        .province-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #e74c3c;
            margin: 15px 0 25px;
            min-height: 2rem;
        }
        .info-card {
            background: #f8f9fa;
            border-left: 5px solid #3498db;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            transition: transform 0.2s;
        }
        .info-card:hover { transform: translateX(5px); }
        .info-card .label { font-size: 0.95rem; color: #555; margin-bottom: 4px; }
        .info-card .value { font-size: 1.4rem; font-weight: 700; color: #2c3e50; }
        .placeholder-text { color: #95a5a6; font-style: italic; margin-top: 20px; }
        .update-note {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #856404;
            margin-top: 30px;
        }
        @media (max-width: 850px) {
            .container { flex-direction: column; height: auto; }
            #map-wrapper { height: 55vh; }
            #info-panel { height: auto; min-height: 40vh; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="map-wrapper">
        <div id="map"></div>
    </div>
    <div id="info-panel">
        <h2>📍 Eyalet Detay Bilgileri</h2>
        <div id="province-name" class="province-title">Lütfen haritadan bir eyalet seçin</div>
        
        <div class="info-card">
            <div class="label">Türkçe ve Türk Kültürü Dersi Sayısı</div>
            <div id="course-count" class="value">-</div>
        </div>
        <div class="info-card">
            <div class="label">Öğretmen Sayısı</div>
            <div id="teacher-count" class="value">-</div>
        </div>
        <div class="info-card">
            <div class="label">Öğrenci Sayısı</div>
            <div id="student-count" class="value">-</div>
        </div>

        <div class="update-note">
            💡 Not: Gösterilen veriler örnek amaçlıdır. `provinceData` nesnesini düzenleyerek gerçek verilerle güncelleyebilirsiniz.
        </div>
    </div>
</div>

<!-- Harita Verisi & Yapılandırma -->
<script>
var simplemaps_countrymap_mapdata={

    width: "responsive",
    background_color: "#FFFFFF",
    background_transparent: "yes",
    border_color: "#ffffff",
    pop_ups: "detect",
    state_description: "State description ",
    state_color: "#88A4BC ",
    state_hover_color: "#3B729F ",
    state_url: " ",
    border_size: 1.5,
    all_states_inactive: "no ",
    all_states_zoomable: "yes ",
    location_description: "Location description ",
    location_url: " ",
    location_color: "#FF0067 ",
    location_opacity: 0.8,
    location_hover_opacity: 1,
    location_size: 25,
    location_type: "square ",
    location_image_source: "frog.png ",
    location_border_color: "#FFFFFF ",
    location_border: 2,
    location_hover_border: 2.5,
    all_locations_inactive: "no ",
    all_locations_hidden: "no ",
    label_color: "#ffffff ",
    label_hover_color: "#ffffff ",
    label_size: 16,
    label_font: "Arial ",
    label_display: "auto ",
    label_scale: "yes ",
    hide_labels: "no ",
    hide_eastern_labels: "no ",
    zoom: "yes ",
    manual_zoom: "yes ",
    back_image: "no ",
    initial_back: "no ",
    initial_zoom: "-1 ",
    initial_zoom_solo: "no ",
    region_opacity: 1,
    region_hover_opacity: 0.6,
    zoom_out_incrementally: "yes ",
    zoom_percentage: 0.99,
    zoom_time: 0.5,
    popup_color: "white ",
    popup_opacity: 0.9,
    popup_shadow: 1,
    popup_corners: 5,
    popup_font: "12px/1.5 Verdana, Arial, Helvetica, sans-serif ",
    popup_nocss: "no ",
    div: "map ",
    auto_load: "yes ",
    url_new_tab: "no ",
    images_directory: "default ",
    fade_time: 0.1,
    link_text: "View Website ",
    
    // 🔑 TIKLAMA OLAYI: Eyalet seçildiğinde çalışacak fonksiyon
    state_click_callback: function(state_id) {
        const data = provinceData[state_id] || { courses: 0, teachers: 0, students: 0 };
        const name = simplemaps_countrymap_mapdata.state_specific[state_id]?.name?.trim() || "Seçim Yapılmadı";
        
        document.getElementById('province-name').textContent = name;
        document.getElementById('course-count').textContent = data.courses;
        document.getElementById('teacher-count').textContent = data.teachers;
        document.getElementById('student-count').textContent = data.students;
    }
},
state_specific: {
    BEBRU: { name: "Brussels ", description: "default ", color: "default ", hover_color: "default ", url: "default " },
    BEVAN: { name: "Antwerp ", description: "default ", color: "default ", hover_color: "default ", url: "default " },
    BEVBR: { name: "Flemish Brabant ", description: "default ", color: "default ", hover_color: "default ", url: "default " },
    BEVLI: { name: "Limburg ", description: "default ", color: "default ", hover_color: "default ", url: "default " },
    BEVOV: { name: "East Flanders ", description: "default ", color: "default ", hover_color: "default ", url: "default " },
    BEVWV: { name: "West Flanders ", description: "default ", color: "default ", hover_color: "default ", url: "default " },
    BEWBR: { name: "Walloon Brabant ", description: "default ", color: "default ", hover_color: "default ", url: "default " },
    BEWHT: { name: "Hainaut ", description: "default ", color: "default ", hover_color: "default ", url: "default " },
    BEWLG: { name: "Liege ", description: "default ", color: "default ", hover_color: "default ", url: "default " },
    BEWLX: { name: "Luxembourg ", description: "default ", color: "default ", hover_color: "default ", url: "default " },
    BEWNA: { name: "Namur ", description: "default ", color: "default ", hover_color: "default ", url: "default " }
},
locations: {
    "0 ": { name: "Brussels ", lat: "50.833333 ", lng: "4.333333 " }
},
labels: {
    BEBRU: { name: "Brussels ", parent_id: "BEBRU " },
    BEVAN: { name: "Antwerp ", parent_id: "BEVAN " },
    BEVBR: { name: "Flemish Brabant ", parent_id: "BEVBR " },
    BEVLI: { name: "Limburg ", parent_id: "BEVLI " },
    BEVOV: { name: "East Flanders ", parent_id: "BEVOV " },
    BEVWV: { name: "West Flanders ", parent_id: "BEVWV " },
    BEWBR: { name: "Walloon Brabant ", parent_id: "BEWBR " },
    BEWHT: { name: "Hainaut ", parent_id: "BEWHT " },
    BEWLG: { name: "Liege ", parent_id: "BEWLG " },
    BEWLX: { name: "Luxembourg ", parent_id: "BEWLX " },
    BEWNA: { name: "Namur ", parent_id: "BEWNA " }
}
};

// 📊 ÖRNEK VERİLER (Daha sonra gerçek verilerle değiştirilecek)
var provinceData = {
    "BEBRU": { courses: 42, teachers: 35, students: 810 },
    "BEVAN": { courses: 30, teachers: 24, students: 580 },
    "BEVBR": { courses: 25, teachers: 20, students: 490 },
    "BEVLI": { courses: 14, teachers: 11, students: 280 },
    "BEVOV": { courses: 38, teachers: 31, students: 740 },
    "BEVWV": { courses: 35, teachers: 28, students: 690 },
    "BEWBR": { courses: 17, teachers: 13, students: 350 },
    "BEWHT": { courses: 23, teachers: 19, students: 460 },
    "BEWLG": { courses: 20, teachers: 16, students: 390 },
    "BEWLX": { courses: 9,  teachers: 7,  students: 180 },
    "BEWNA": { courses: 19, teachers: 15, students: 360 }
};
</script>

<!-- SimpleMaps Kütüphanesi -->

<script src="https://cdn.simplemaps.com/static/countrymap/be/be.js"></script>

</body>
</html>

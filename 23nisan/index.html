<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eğitim Paneli: Video ve Boyama</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f4f8;
        }

        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        .section {
            flex: 1;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.5s ease-in-out;
            border: 4px solid #fff;
        }

        .section.focused { flex: 10; border-color: #3498db; }

        .header-bar {
            background: #ecf0f1;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ddd;
        }

        #video-wrapper {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        video { width: 100%; height: 100%; max-height: 85vh; }

        #paint-wrapper {
            flex: 1;
            display: flex;
            background: #95a5a6;
            overflow: hidden;
            position: relative;
        }
        
        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow: hidden;
            background: #fff;
        }

        /* SVG alanını ortala ve boyutunu sınırla */
        #svg-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #svg-container svg { 
            width: 100%; 
            height: 100%; 
            max-width: 100%; 
            max-height: 100%;
            transform-origin: center center;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.2));
        }

        .palette {
            width: 100px;
            background: #ffffff;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-content: start;
            gap: 8px;
            padding: 15px 8px;
            border-left: 3px solid #ddd;
            overflow-y: auto;
        }

        .color-dot {
            width: 35px; height: 35px; border-radius: 50%;
            cursor: pointer; border: 2px solid #eee; transition: 0.2s;
        }
        .color-dot.active { transform: scale(1.2); border-color: #333; box-shadow: 0 0 8px rgba(0,0,0,0.3); }

        .btn-tab {
            padding: 8px 15px;
            border: none;
            border-radius: 10px;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: background 0.3s;
        }
        .btn-tab:hover {
            background: #2980b9;
        }

        #video-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(52, 152, 219, 0.9);
            z-index: 100; display: flex; align-items: center; justify-content: center;
            color: white; cursor: pointer;
        }
        
        .paint-cursor {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%23333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>'), crosshair !important;
        }

        /* SVG parçalarına geçiş animasyonu ekle */
        path, polygon, rect, circle, ellipse {
            transition: fill 0.3s ease;
        }
        
        /* Hata mesajı kutusu için */
        #error-msg {
            display: none;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 200;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }
    </style>
</head>
<body>

<div id="error-msg">
    Güvenlik kısıtlaması (CORS) nedeniyle boyama modülü yüklenemedi. Lütfen dosyayı Live Server veya bir yerel sunucu (localhost) üzerinden açın.
</div>

<div class="container">
    <div class="section" id="video-section" onclick="focusPanel('video-section')">
        <div class="header-bar">
            <span>📺 Video Paneli</span>
            <button class="btn-tab" onclick="toggleFull('video-section')">TAM EKRAN</button>
        </div>
        <div id="video-wrapper">
            <div id="video-cover" onclick="startVideo()"><h2>BAŞLAT</h2></div>
            <video id="main-video" controls>
                <source src="1.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- Boyama paneline 'focused' sınıfını ekleyerek doğrudan animasyonlu açılmasını sağlıyoruz -->
    <div class="section focused" id="paint-section" onclick="focusPanel('paint-section')">
        <div class="header-bar">
            <span>🎨 Boyama Paneli</span>
            <div style="display:flex; gap:5px;">
                <button class="btn-tab" style="background:#27ae60" onclick="resetPaint()">SIFIRLA</button>
                <button class="btn-tab" onclick="toggleFull('paint-section')">TAM EKRAN</button>
            </div>
        </div>
        <div id="paint-wrapper">
            <div class="canvas-container">
                <div id="svg-container">Yükleniyor...</div>
            </div>
            <div class="palette" id="palette"></div>
        </div>
    </div>
</div>

<script>
    const colors = [
        '#FF0000', '#FF4500', '#FF8C00', '#FFD700', '#FFFF00', 
        '#ADFF2F', '#00FF00', '#008000', '#00FA9A', '#00FFFF', 
        '#00BFFF', '#0000FF', '#4B0082', '#8B00FF', '#FF00FF', 
        '#FFC0CB', '#8B4513', '#A9A9A9', '#000000', '#FFFFFF'
    ];
    
    let selectedColor = colors[0];
    let originalSvgCode = '';

    function focusPanel(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('focused'));
        document.getElementById(id).classList.add('focused');
    }

    function toggleFull(id) {
        const section = document.getElementById(id);
        if (!document.fullscreenElement) {
            section.requestFullscreen().catch(err => console.log(err));
        } else {
            document.exitFullscreen();
        }
    }

    function startVideo() {
        document.getElementById('video-cover').style.display = 'none';
        document.getElementById('main-video').play();
    }

    function initPaint() {
        const pal = document.getElementById('palette');
        colors.forEach((c, i) => {
            const d = document.createElement('div');
            d.className = 'color-dot' + (i === 0 ? ' active' : '');
            d.style.backgroundColor = c;
            d.onclick = (e) => {
                e.stopPropagation();
                selectedColor = c;
                document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
                d.classList.add('active');
            };
            pal.appendChild(d);
        });

        // Çizim oyununu hızlı ve pürüzsüz yapabilmek için SVG elementini içe aktaracağız (Canvasta hesap yapmak çok kasar).
        fetch('1.svg')
            .then(res => {
                if(!res.ok) throw new Error("HTTP " + res.status);
                return res.text();
            })
            .then(svgStr => {
                originalSvgCode = svgStr;
                renderSvg(svgStr);
            })
            .catch(err => {
                console.error("Görsel yüklenirken bir hata oluştu:", err);
                document.getElementById('svg-container').innerHTML = "<b>Yüklenemedi.</b>";
                
                // Fetch, yerel "file:///" üzerinden çalıştığında CORS takılır
                if(window.location.protocol === "file:") {
                    document.getElementById('error-msg').style.display = 'block';
                }
            });
    }
    
    function renderSvg(svgStr) {
        const container = document.getElementById('svg-container');
        container.innerHTML = svgStr;
        
        const svgElement = container.querySelector('svg');
        if (svgElement) {
            const w = svgElement.getAttribute('width');
            const h = svgElement.getAttribute('height');
            // Eğer viewBox yoksa ekleyelim ki responsive olup container dışına taşmasın
            if (w && h && !svgElement.hasAttribute('viewBox')) {
                svgElement.setAttribute('viewBox', `0 0 ${w.replace('px','')} ${h.replace('px','')}`);
            }
            // Genişlik ve yüksekliği ekranı dolduracak şekilde ayarla
            svgElement.style.width = '100%';
            svgElement.style.height = '100%';
            
            // Boyama olaylarını ekle
            const paths = svgElement.querySelectorAll('path, polygon, rect, circle, ellipse');
            paths.forEach(path => {
                const originalFill = (path.getAttribute('fill') || '').toUpperCase();
                
                // SVG içerisindeki siyah hatlar (#151515, #000, vb.) tıklanıp boyanmasın, içinden geçilsin
                const isDark = originalFill.includes('#151515') || originalFill.includes('#181818') || originalFill === '#000000' || originalFill === '#000' || originalFill === 'BLACK';
                
                if (!isDark) {
                    path.style.cursor = 'crosshair';
                    path.addEventListener('click', function(e) {
                        e.stopPropagation(); 
                        this.style.fill = selectedColor;
                    });
                } else {
                    // Koyu/Siyah çizgilerin altına tıklanabilsin (Tıklamaları geçirir)
                    path.style.pointerEvents = 'none';
                }
            });
        }
    }

    function resetPaint() {
        if(originalSvgCode) {
            renderSvg(originalSvgCode);
        }
    }

    initPaint();
</script>
</body>
</html>
